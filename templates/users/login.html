{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f6f5f2;
      position: relative;
    }

    /* ---- Shell with orange margin + two panels ---- */
    .shell {
      position: relative;
      z-index: 1;
      width: min(920px, 94vw);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
      display: grid;
      grid-template-columns: 46% 54%;
    }
    /* orange accent strip on the far left */
    .shell::before{
      content:"";
      position:absolute; left:0; top:0; bottom:0;
      width: 0px;
      background:#F26522;
      z-index:2;
    }

    /* ---- Left visual panel ---- */
    .visual {
      position: relative;
      background: linear-gradient(180deg, #F57937, #F26522);
      padding: 24px 24px 0 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation:isolate;
    }
    .visual::after{
      /* subtle pattern overlay so it isn’t flat */
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(ellipse at 20% 10%, rgba(255,255,255,.25), transparent 55%),
                  radial-gradient(ellipse at 80% 90%, rgba(0,0,0,.08), transparent 50%);
      mix-blend-mode: soft-light;
      z-index:0;
    }
    .visual h2{
      position: relative;
      z-index: 1;
      color:#fff;
      margin:0;
      font-weight:800;
      font-size:30px;
      line-height: 1.15;
      letter-spacing:.3px;
      text-align: center;
    }

    /* ---- Right form panel (your original container refined) ---- */
    .container {
      background-color: #fff;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 36px 42px;
    }
    form {
      width: 100%;
      max-width: 360px;
      display: flex; flex-direction: column; align-items: stretch;
      text-align: center;
    }
    h1 { font-weight: 800; margin: 0 0 12px; }
    .subtitle { margin:0 0 16px; color:#666; font-size: 14px; }

    input {
      background-color: #eee;
      border: 1px solid transparent;
      padding: 12px 14px;
      margin: 8px 0;
      width: 100%;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    input:focus {
      outline: none;
      background:#fff;
      border-color:#F26522;
      box-shadow: 0 0 0 4px rgba(242,101,34,.12);
    }

    a {
      color: #444;
      font-size: 13px;
      text-decoration: none;
      margin: 10px 0 16px;
      align-self: flex-end;
    }
    a:hover { text-decoration: underline; }

    button {
      border-radius: 999px;
      border: 1px solid #F26522;
      background-color: #F26522;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      padding: 12px 18px;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: transform 80ms ease-in, filter .15s ease;
      cursor: pointer;
      margin-top: 6px;
      width: 100%;
      box-shadow: 0 8px 16px rgba(242,101,34,.28);
    }
    button:hover { filter: brightness(1.03); }
    button:active { transform: translateY(1px) scale(.99); }

    /* error block */
    .errors {
      color: #a40000;
      background: #fff5f5;
      border: 1px solid #ffcaca;
      border-radius:10px;
      padding: 10px 12px;
      font-size: 13px;
      margin: 0 0 10px;
      text-align:left;
    }

    /* ---- Responsive: stack on small screens ---- */
    @media (max-width: 820px){
      .shell { grid-template-columns: 1fr; }
      .visual { display: none; } /* hide art on small screens */
      .shell::before{ width: 0; }
      .container { padding: 28px 22px; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <!-- LEFT: orange/image panel -->
    <aside class="visual">
      <h2>Customer Relations Management Portal</h2>
    </aside>

    <!-- RIGHT: your form (kept from your version) -->
    <section class="container">
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <h1>Sign in</h1>
        <p class="subtitle">Welcome back. Please use your credentials.</p>

        {% if form.errors %}
          <div class="errors">
            {{ form.errors }}
          </div>
        {% endif %}

        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />

        <a href="{% url 'password_reset' %}">Forgot your password?</a>
        <button type="submit">Sign In</button>
      </form>
    </section>
  </div>
</body>
</html>
