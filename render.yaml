databases:
services:
  - type: web
    name: project-management-app
    runtime: python
    pythonVersion: 3.12
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn project_manage.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        value: generate-a-random-secret-key-or-set-via-render-dashboard
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com


  - name: project-management-db
    databaseName: project_management
    user: project_management_user
    plan: free
      - key: CSRF_TRUSTED_ORIGINS
