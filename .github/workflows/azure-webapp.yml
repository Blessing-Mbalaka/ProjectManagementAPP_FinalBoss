name: Build and Deploy Django App

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DJANGO_SETTINGS_MODULE: project_manage.settings_test
  DATABASE_URL: sqlite://:memory:
  EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python  
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: ✅ Run Django checks
      run: |
        python manage.py check --settings=project_manage.settings_test

    - name: 🧪 Run tests
      run: |
        python manage.py test --settings=project_manage.settings_test --keepdb

    - name: 📊 Test coverage (optional)
      run: |
        pip install coverage
        coverage run --source='.' manage.py test --settings=project_manage.settings_test
        coverage report

    - name: 🐳 Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: 🛠️ Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: 🎉 Success
      run: |
        echo "✅ All tests passed!"
        echo "✅ Docker image built and pushed successfully!"
        echo "📦 Available at: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "🚀 Ready for deployment to Azure!"

    - name: ❌ Failure notification
      if: failure()
      run: |
        echo "❌ Build failed! Check the test output above."
        exit 1